<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ru' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Greek:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__icon" aria-hidden="true">🇬🇷</span>
        <span class="site-brand__text">{{ site.title }}</span>
      </a>
      {% if site.description %}
      <p class="site-tagline">{{ site.description }}</p>
      {% endif %}
    </div>
  </header>

  <main class="site-main container">
    <article class="content-card">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Сделано с Jekyll{% if site.github %} · <a href="{{ site.github.repository_url }}">GitHub</a>{% endif %}</p>
    </div>
  </footer>
</body>
</html>
